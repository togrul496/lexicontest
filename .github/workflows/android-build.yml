name: Android Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: "17"
  NDK_VERSION: "27.0.12077973"
  CMAKE_VERSION: "3.22.1"

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Gradle cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Restore Android toolchain cache
        id: android-toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk
            ${{ env.ANDROID_SDK_ROOT }}/cmake
          key: ${{ runner.os }}-android-toolchain-ndk-${{ env.NDK_VERSION }}-cmake-${{ env.CMAKE_VERSION }}

      - name: Install NDK and CMake
        if: steps.android-toolchain-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "ndk;${NDK_VERSION}" "cmake;${CMAKE_VERSION}"

      - name: Verify Android toolchain
        shell: bash
        run: |
          test -d "${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
          test -d "${ANDROID_SDK_ROOT}/cmake/${CMAKE_VERSION}"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Save Gradle cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/pubspec.lock') }}

      - name: Save Android toolchain cache
        if: always() && steps.android-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk
            ${{ env.ANDROID_SDK_ROOT }}/cmake
          key: ${{ runner.os }}-android-toolchain-ndk-${{ env.NDK_VERSION }}-cmake-${{ env.CMAKE_VERSION }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
