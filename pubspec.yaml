name: lexicon_flutter
description: "Cross-platform Flutter rebuild of the Lexicon learning app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  file_picker: ^8.1.7
  flutter_local_notifications: ^18.0.1
  flutter_markdown: ^0.7.6+2
  flutter_riverpod: ^2.6.1
  flutter_tts: ^4.2.2
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
